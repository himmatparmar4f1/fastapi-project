<!DOCTYPE html>
<html>
<head>
  <title>PDF Dashboard System</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      margin: 0;
      padding: 0;
    }

    .box {
      width: 400px;
      margin: 80px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    #dashboard {
      display: none;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #333;
      color: white;
    }
  </style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginBox" class="box">

  <h2>🔐 Login</h2>

  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <hr>

  <h3>🆕 Register</h3>

  <input id="regUser" placeholder="Username">
  <input id="regPass" type="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <p id="msg"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <h2>📄 PDF Upload Dashboard</h2>

  <input type="file" id="pdfFile" multiple accept="application/pdf">

  <br><br>

  <button onclick="uploadPDF()">Upload PDFs</button>
  <button onclick="getOutput()">Get Output</button>
  <button onclick="logout()">Logout</button>

  <table>
    <thead>
      <tr>
        <th>File</th>
        <th>Name</th>
        <th>Net Pay</th>
        <th>Basic</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>

let globalData = [];

// ---------------- LOGIN ----------------
function login() {
  fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("loginUser").value,
      password: document.getElementById("loginPass").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "success") {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    } else {
      document.getElementById("msg").innerText = "❌ Invalid Login";
    }
  });
}


// ---------------- REGISTER ----------------
function register() {
  fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("regUser").value,
      password: document.getElementById("regPass").value
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;
  });
}


// ---------------- UPLOAD PDF ----------------
function uploadPDF() {
  const fileInput = document.getElementById("pdfFile");
  const files = fileInput.files;

  const formData = new FormData();

  for(let i=0; i<files.length; i++) {
    formData.append("files", files[i]);
  }

  fetch("/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    alert("Upload Done");
  });
}


// ---------------- GET OUTPUT ----------------
function getOutput() {
  fetch("/get-output")
  .then(res => res.json())
  .then(data => {

    globalData = data;

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach(item => {
      table.innerHTML += `
        <tr>
          <td>${item.file}</td>
          <td>${item.name}</td>
          <td>${item.net_pay}</td>
          <td>${item.basic_salary}</td>
        </tr>
      `;
    });

  });
}


// ---------------- LOGOUT ----------------
function logout() {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("dashboard").style.display = "none";
}

</script>

</body>
</html>
