<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF System</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* LOGIN CARD */
    .card {
      width: 380px;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      text-align: center;
    }

    .card h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    .link {
      margin-top: 10px;
      font-size: 13px;
      cursor: pointer;
      color: #667eea;
    }

    /* DASHBOARD */
    #dashboard {
      display: none;
      width: 90%;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    th {
      background: #667eea;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .btn-row button {
      width: auto;
      margin-right: 10px;
      padding: 8px 12px;
    }

  </style>
</head>

<body>

<!-- ================= LOGIN BOX ================= -->
<div class="card" id="loginBox">

  <h2>🔐 Secure Login</h2>

  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="toggleRegister()">Create new account</div>

  <div id="registerBox" style="display:none;">
    <input id="regUser" placeholder="New Username">
    <input id="regPass" type="password" placeholder="New Password">
    <button onclick="register()">Register</button>
  </div>

  <p id="msg"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <h2>📄 PDF Processing Dashboard</h2>

  <input type="file" id="pdfFile" multiple>

  <div class="btn-row">
    <button onclick="uploadPDF()">Upload</button>
    <button onclick="getOutput()">Get Data</button>
    <button onclick="logout()">Logout</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>File</th>
        <th>Name</th>
        <th>Net Pay</th>
        <th>Basic</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>

let globalData = [];

// TOGGLE REGISTER
function toggleRegister(){
  let box = document.getElementById("registerBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// LOGIN
function login(){
  fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: loginUser.value,
      password: loginPass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="success"){
      loginBox.style.display="none";
      dashboard.style.display="block";
    } else {
      msg.innerText="❌ Invalid credentials";
    }
  });
}

// REGISTER
function register(){
  fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    msg.innerText=d.message;
  });
}

// UPLOAD
function uploadPDF(){
  let form=new FormData();
  for(let f of pdfFile.files){
    form.append("files",f);
  }

  fetch("/upload",{method:"POST",body:form})
  .then(r=>r.json())
  .then(()=>alert("Uploaded"));
}

// GET DATA
function getOutput(){
  fetch("/get-output")
  .then(r=>r.json())
  .then(data=>{
    globalData=data;
    tableBody.innerHTML="";
    data.forEach(i=>{
      tableBody.innerHTML+=`
        <tr>
          <td>${i.file}</td>
          <td>${i.name}</td>
          <td>${i.net_pay}</td>
          <td>${i.basic_salary}</td>
        </tr>
      `;
    });
  });
}

// LOGOUT
function logout(){
  dashboard.style.display="none";
  loginBox.style.display="block";
}

</script>

</body>
</html>
