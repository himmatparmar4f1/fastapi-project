<!DOCTYPE html>
<html>
<head>
  <title>PDF Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eef2f3, #8e9eab);
      font-family: Arial, sans-serif;
    }

    .container-box {
      background: white;
      padding: 25px;
      margin-top: 40px;
      border-radius: 12px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.15);
    }

    h2 {
      font-weight: bold;
      margin-bottom: 20px;
    }

    .btn-space {
      margin-right: 10px;
    }

    table {
      margin-top: 20px;
    }

    th {
      background: #343a40 !important;
      color: white;
    }
  </style>
</head>

<body>

<div class="container container-box">

  <h2>📄 PDF Processing Dashboard</h2>

  <!-- FILE UPLOAD -->
  <input type="file" id="pdfFile" multiple accept="application/pdf" class="form-control">

  <br>

  <!-- BUTTONS -->
  <button class="btn btn-primary btn-space" onclick="uploadPDF()">Upload PDFs</button>
  <button class="btn btn-success btn-space" onclick="getOutput()">Get Output</button>
  <button class="btn btn-warning btn-space" onclick="downloadJSON()">Download JSON</button>
  <button class="btn btn-info btn-space" onclick="downloadExcel()">Download Excel</button>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>File Name</th>
          <th>Employee Name</th>
          <th>Net Pay</th>
          <th>Basic Salary</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

let globalData = [];

// 📤 Upload
function uploadPDF() {
  const fileInput = document.getElementById("pdfFile");
  const files = fileInput.files;

  const formData = new FormData();

  for (let i = 0; i < files.length; i++) {
    formData.append("files", files[i]);
  }

  fetch("/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    alert("Upload Successful 🚀");
  });
}


// 📊 Get Output
function getOutput() {
  fetch("/get-output")
    .then(res => res.json())
    .then(data => {

      globalData = data;

      const tableBody = document.getElementById("tableBody");
      tableBody.innerHTML = "";

      data.forEach(item => {
        tableBody.innerHTML += `
          <tr>
            <td>${item.file}</td>
            <td>${item.name}</td>
            <td>${item.net_pay}</td>
            <td>${item.basic_salary}</td>
          </tr>
        `;
      });

    });
}


// 📥 JSON Download
function downloadJSON() {
  const dataStr = "data:text/json;charset=utf-8," +
    encodeURIComponent(JSON.stringify(globalData, null, 2));

  const a = document.createElement("a");
  a.href = dataStr;
  a.download = "data.json";
  a.click();
}


// 📥 Excel Download
function downloadExcel() {

  let csv = "File Name,Employee Name,Net Pay,Basic Salary\n";

  globalData.forEach(row => {
    csv += `"${row.file}","${row.name}","${row.net_pay}","${row.basic_salary}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "pdf_data.csv";
  a.click();

  window.URL.revokeObjectURL(url);
}

</script>

</body>
</html>
