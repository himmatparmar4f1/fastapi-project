<!DOCTYPE html>
<html>
<head>
<title>Secure SaaS System</title>

<style>
body{
  font-family:Segoe UI;
  background:linear-gradient(135deg,#4f46e5,#9333ea);
  margin:0;
}

.box{
  width:420px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:10px;
  background:#4f46e5;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

.eye{
  float:right;
  cursor:pointer;
}

#dash,#profile{display:none;}
</style>
</head>

<body>

<!-- REGISTER -->
<div class="box" id="regBox">
<h2>Register</h2>

<input id="fn" placeholder="First Name">
<input id="ln" placeholder="Last Name">
<input id="dob" type="date">

<input id="email" placeholder="Email">

<input type="password" id="pass">
<span class="eye" onclick="toggle(pass)">👁</span>

<input type="password" id="cpass">
<span class="eye" onclick="toggle(cpass)">👁</span>

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>

<input id="lemail" placeholder="Email">

<input type="password" id="lpass">
<span class="eye" onclick="toggle(lpass)">👁</span>

<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="box">

<h2>Dashboard</h2>

<input type="file" id="file" multiple>
<button onclick="upload()">Upload</button>
<button onclick="getData()">Get Data</button>
<button onclick="showProfile()">Profile</button>

<table id="tb"></table>
</div>

<!-- PROFILE -->
<div id="profile" class="box">

<h2>Profile</h2>

<p id="pname"></p>
<p id="pemail"></p>

<input id="newpass" placeholder="New Password">
<button onclick="updatePass()">Update Password</button>

</div>

<script>

let currentEmail="";

function toggle(e){
  e.type = e.type==="password"?"text":"password";
}

// SEND OTP
function sendOTP(){
  fetch("/send-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value})
  });
  alert("OTP sent to email");
}

// REGISTER
function register(){

  if(pass.value !== cpass.value){
    alert("Password mismatch");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      first_name:fn.value,
      last_name:ln.value,
      birthdate:dob.value,
      email:email.value,
      password:pass.value,
      otp:otp.value
    })
  }).then(r=>r.json()).then(d=>{
    alert(d.status);
    regBox.reset;
    regBox.style.display="none";
    loginBox.style.display="block";
  });
}

// LOGIN
function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:lemail.value,
      password:lpass.value
    })
  }).then(r=>r.json()).then(d=>{
    if(d.status==="success"){
      currentEmail=lemail.value;

      loginBox.style.display="none";
      dash.style.display="block";

      pname.innerText=d.user.first_name;
      pemail.innerText=d.user.email;
    }
  });
}

// PROFILE
function showProfile(){
  dash.style.display="none";
  profile.style.display="block";
}

// UPDATE PASSWORD
function updatePass(){
  fetch("/update-password",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:currentEmail,
      password:newpass.value
    })
  });
}

// UPLOAD
function upload(){
  let f=new FormData();
  for(let x of file.files){
    f.append("files",x);
  }
  fetch("/upload",{method:"POST",body:f});
}

// GET DATA
function getData(){
  fetch("/get-output")
  .then(r=>r.json())
  .then(d=>{
    tb.innerHTML="";
    d.forEach(i=>{
      tb.innerHTML+=`
        <tr>
          <td>${i.file}</td>
          <td>${i.name}</td>
          <td>${i.net_pay}</td>
          <td>${i.basic_salary}</td>
        </tr>`;
    });
  });
}

</script>

</body>
</html>
