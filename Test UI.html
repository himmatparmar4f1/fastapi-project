<!DOCTYPE html>
<html>
<head>
  <title>Secure SaaS System</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg,#4f46e5,#9333ea);
    }

    .container {
      width: 420px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #3730a3;
    }

    #dashboard {
      display: none;
      width: 90%;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th {
      background: #4f46e5;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .link {
      text-align: center;
      cursor: pointer;
      color: blue;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- ================= REGISTER ================= -->
<div class="container" id="registerBox">

  <h2>🆕 Create Account</h2>

  <input id="fn" placeholder="First Name">
  <input id="ln" placeholder="Last Name">

  <input type="date" id="dob">

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <div class="link" onclick="showLogin()">Already have account? Login</div>

</div>

<!-- ================= LOGIN ================= -->
<div class="container" id="loginBox" style="display:none;">

  <h2>🔐 Login</h2>

  <input id="lemail" placeholder="Email">
  <input id="lpass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="showRegister()">Create Account</div>

</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <h2>📄 PDF Dashboard</h2>

  <input type="file" id="file" multiple>

  <button onclick="upload()">Upload</button>
  <button onclick="getData()">Get Data</button>
  <button onclick="logout()">Logout</button>

  <table>
    <thead>
      <tr>
        <th>File</th>
        <th>Name</th>
        <th>Net</th>
        <th>Basic</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>

</div>

<script>

function showLogin(){
  registerBox.style.display="none";
  loginBox.style.display="block";
}

function showRegister(){
  loginBox.style.display="none";
  registerBox.style.display="block";
}

// REGISTER
function register(){
  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      first_name:fn.value,
      last_name:ln.value,
      birthdate:dob.value,
      email:email.value,
      password:pass.value
    })
  }).then(r=>r.json()).then(d=>{
    alert(d.message);
    showLogin();
  });
}

// LOGIN
function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:lemail.value,
      password:lpass.value
    })
  }).then(r=>r.json()).then(d=>{
    if(d.status==="success"){
      loginBox.style.display="none";
      dashboard.style.display="block";
    }else{
      alert("Invalid login");
    }
  });
}

// UPLOAD
function upload(){
  let f=new FormData();
  for(let x of file.files){
    f.append("files",x);
  }
  fetch("/upload",{method:"POST",body:f})
  .then(()=>alert("Uploaded"));
}

// GET DATA
function getData(){
  fetch("/get-output")
  .then(r=>r.json())
  .then(d=>{
    tb.innerHTML="";
    d.forEach(i=>{
      tb.innerHTML+=`
        <tr>
          <td>${i.file}</td>
          <td>${i.name}</td>
          <td>${i.net_pay}</td>
          <td>${i.basic_salary}</td>
        </tr>`;
    });
  });
}

// LOGOUT
function logout(){
  dashboard.style.display="none";
  registerBox.style.display="block";
}

</script>

</body>
</html>
